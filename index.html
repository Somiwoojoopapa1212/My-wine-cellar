<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MWC - My Wine Cellar</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4D204D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MWC">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --primary: #4D204D; --primary-l: #7A3878; --primary-p: #A060A0;
      --bg: #FBF5FC; --card: #FFFFFF; --text: #1A0E18; --sub: #6B5068;
      --border: #E0D0E4; --chip: #F0E4F0; --hdr: 56px;
    }
    [data-theme="dark"] {
      --bg: #1A0E18; --card: #2A1A28; --text: #E8E0EE;
      --sub: #A090A8; --border: #3D2A3C; --chip: #3D2A3C;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }

    /* ── LOGIN ── */
    #login-overlay {
      position: fixed; inset: 0; background: var(--primary);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
    }
    .login-box { text-align: center; padding: 40px 32px; }
    .login-icon { font-size: 64px; margin-bottom: 16px; }
    .login-brand { font-size: 40px; font-weight: 900; color: #fff; letter-spacing: 5px; margin-bottom: 6px; }
    .login-name { font-size: 14px; color: rgba(255,255,255,.65); margin-bottom: 52px; letter-spacing: 1px; }
    .login-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #fff; color: #333; border: none; padding: 14px 32px;
      border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,.25); margin: 0 auto; width: 100%; max-width: 280px;
    }
    .login-btn:active { opacity: .88; }
    .google-icon { width: 22px; height: 22px; flex-shrink: 0; }

    /* ── LOADING ── */
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      z-index: 500; display: none; align-items: center; justify-content: center;
    }
    #loading-overlay.show { display: flex; }
    .spinner {
      width: 46px; height: 46px; border: 4px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HEADER ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--hdr);
      background: var(--primary); display: flex; align-items: center;
      padding: 0 12px; gap: 10px; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    #logo { font-size: 21px; font-weight: 900; color: #fff; letter-spacing: 2px; white-space: nowrap; }
    #search-input {
      flex: 1; height: 36px; border: none; border-radius: 18px;
      padding: 0 14px; font-size: 14px; background: rgba(255,255,255,.2); color: #fff; outline: none;
    }
    #search-input::placeholder { color: rgba(255,255,255,.6); }
    #search-input:focus { background: rgba(255,255,255,.3); }
    .hdr-btn {
      background: none; border: none; color: #fff; font-size: 20px;
      cursor: pointer; width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    #user-avatar {
      width: 30px; height: 30px; border-radius: 50%; border: 2px solid rgba(255,255,255,.5);
      cursor: pointer; object-fit: cover; display: none;
    }

    /* ── FILTER BAR ── */
    #filter-bar {
      position: fixed; top: var(--hdr); left: 0; right: 0;
      background: var(--card); border-bottom: 1px solid var(--border); z-index: 90; padding: 8px 12px;
    }
    #type-chips { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 7px; }
    #type-chips::-webkit-scrollbar { display: none; }
    .type-chip {
      padding: 4px 13px; border-radius: 16px; border: 1.5px solid var(--border);
      background: var(--chip); color: var(--text); font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all .15s; user-select: none;
    }
    .type-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    #filter-row2 { display: flex; gap: 6px; }
    .fsel {
      flex: 1; height: 32px; border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text); font-size: 12px; padding: 0 6px;
      outline: none; cursor: pointer; min-width: 0;
    }

    /* ── MAIN ── */
    #main { padding: 0 12px 88px; }
    #stats-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 6px; font-size: 12px; color: var(--sub); }
    #clear-btn { display: none; font-size: 11px; color: var(--primary); font-weight: 700; background: none; border: 1px solid var(--primary); cursor: pointer; padding: 2px 8px; border-radius: 10px; }

    /* ── WINE CARD ── */
    .wine-card {
      background: var(--card); border-radius: 14px; border: 1px solid var(--border);
      margin-bottom: 10px; cursor: pointer; transition: transform .1s; overflow: hidden;
      display: flex; align-items: stretch;
    }
    .wine-card:active { transform: scale(.98); }
    .card-photo {
      width: 80px; flex-shrink: 0; background: var(--chip);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; overflow: hidden;
    }
    .card-photo img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { flex: 1; padding: 12px; min-width: 0; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 3px; }
    .wine-name { font-size: 15px; font-weight: 700; line-height: 1.3; flex: 1; }
    .bottle-badge { background: var(--primary); color: #fff; font-size: 12px; font-weight: 700; padding: 2px 9px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
    .wine-winery { font-size: 12px; color: var(--sub); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
    .mc { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .ct-레드    { background:#F0D0D0; color:#8B1A1A; }
    .ct-화이트  { background:#FDF5CC; color:#7A6000; }
    .ct-로제    { background:#FAD8E0; color:#A0204A; }
    .ct-스파클링{ background:#D0E8F0; color:#1A5870; }
    .ct-디저트  { background:#F0E4C8; color:#7A4010; }
    .ct-주정강화{ background:#E0D0F0; color:#3A1A8B; }
    .ct-기타    { background:#D8ECD8; color:#1A5A1A; }
    [data-theme="dark"] .ct-레드    { background:#3A1010; color:#F0A0A0; }
    [data-theme="dark"] .ct-화이트  { background:#3A3010; color:#F0D870; }
    [data-theme="dark"] .ct-로제    { background:#3A1020; color:#F0A0B8; }
    [data-theme="dark"] .ct-스파클링{ background:#10283A; color:#80C8E8; }
    [data-theme="dark"] .ct-디저트  { background:#3A2010; color:#E8B870; }
    [data-theme="dark"] .ct-주정강화{ background:#1A1030; color:#B090F0; }
    [data-theme="dark"] .ct-기타    { background:#102010; color:#90D090; }
    .mc-dim { background: var(--chip); color: var(--sub); }
    .card-bottom { display: flex; justify-content: space-between; align-items: center; }
    .wine-price { font-size: 13px; font-weight: 600; color: var(--primary-p); }
    .wine-ratings-preview { font-size: 11px; color: var(--sub); background: var(--chip); padding: 2px 7px; border-radius: 10px; }
    .wine-memo { font-size: 12px; color: var(--sub); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── EMPTY / NO-RESULT ── */
    #empty-state, #no-results { text-align: center; padding: 60px 20px; color: var(--sub); display: none; }
    .ei { font-size: 48px; margin-bottom: 12px; }
    .et { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .es { font-size: 13px; }

    /* ── FAB ── */
    #fab {
      position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px;
      border-radius: 28px; background: var(--primary); color: #fff; font-size: 30px;
      border: none; cursor: pointer; box-shadow: 0 4px 18px rgba(77,32,77,.45);
      display: flex; align-items: center; justify-content: center; z-index: 100; transition: transform .15s;
    }
    #fab:active { transform: scale(.9); }

    /* ── BACKDROP ── */
    #backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s; }
    #backdrop.show { opacity: 1; pointer-events: all; }

    /* ── FORM PANEL ── */
    #form-panel {
      position: fixed; inset: 0; background: var(--bg); z-index: 300;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    #form-panel.show { transform: translateY(0); }
    #form-hdr {
      background: var(--primary); color: #fff; padding: 0 12px; height: var(--hdr);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #form-title { flex: 1; font-size: 17px; font-weight: 700; }
    .fhbtn { background: none; border: none; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; padding: 6px 12px; border-radius: 8px; }
    .fhbtn:active { background: rgba(255,255,255,.2); }
    #form-body { flex: 1; overflow-y: auto; padding: 16px 14px 40px; }
    .fg { margin-bottom: 16px; }
    .fl { font-size: 11px; font-weight: 700; color: var(--sub); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .5px; }
    .fl .req { color: #E03060; }
    .fi, .fs, .fta {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 10px; background: var(--card); color: var(--text);
      font-size: 15px; outline: none; transition: border-color .15s; font-family: inherit;
    }
    .fi:focus, .fs:focus, .fta:focus { border-color: var(--primary); }
    .fta { height: 80px; resize: none; line-height: 1.5; }
    .frow { display: flex; gap: 10px; }
    .frow .fg { flex: 1; min-width: 0; }

    /* ── PHOTO AREA ── */
    .photo-area {
      width: 100%; height: 180px; border: 2px dashed var(--border); border-radius: 12px;
      background: var(--bg); cursor: pointer; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-area img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--sub); }
    .photo-placeholder span:first-child { font-size: 36px; }
    .photo-placeholder span:last-child { font-size: 13px; font-weight: 500; }
    #photo-del-btn {
      position: absolute; top: 8px; right: 8px; width: 30px; height: 30px;
      border-radius: 50%; background: rgba(0,0,0,.6); color: #fff; border: none;
      font-size: 16px; cursor: pointer; display: none;
      align-items: center; justify-content: center;
    }
    #photo-del-btn.show { display: flex; }

    /* ── BOTTLE STEPPER ── */
    .bottle-stepper {
      display: flex; align-items: center; height: 44px;
      border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card);
    }
    .sbtn { width: 48px; height: 100%; background: var(--chip); border: none; font-size: 24px; color: var(--primary); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .sbtn:active { background: var(--border); }
    #bottle-count { flex: 1; text-align: center; font-size: 18px; font-weight: 800; }

    /* ── RATINGS LIST ── */
    #ratings-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .rating-row { display: flex; gap: 6px; align-items: center; }
    .rating-row .fs { flex: 1.4; min-width: 0; }
    .rating-row .fi { flex: 1; min-width: 0; }
    .r-del {
      width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border);
      background: none; color: var(--sub); font-size: 16px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .r-del:active { background: var(--chip); }
    .add-rating-btn {
      width: 100%; padding: 9px; border: 1.5px dashed var(--border); border-radius: 10px;
      background: none; color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .add-rating-btn:active { background: var(--chip); }

    /* ── DETAIL SHEET ── */
    #detail-sheet {
      position: fixed; left: 0; right: 0; bottom: 0; max-height: 90vh;
      background: var(--card); border-radius: 20px 20px 0 0; z-index: 300;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    #detail-sheet.show { transform: translateY(0); }
    .sh-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
    #sheet-body { flex: 1; overflow-y: auto; }
    #sh-photo { width: 100%; height: 200px; object-fit: cover; display: none; }
    .sh-info { padding: 14px 16px 12px; }
    #sh-name { font-size: 21px; font-weight: 800; line-height: 1.3; margin-bottom: 3px; }
    #sh-winery { font-size: 13px; color: var(--sub); margin-bottom: 12px; }
    .sh-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .sh-chip { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: var(--chip); color: var(--sub); font-weight: 500; }
    .d-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .d-item { background: var(--bg); border-radius: 10px; padding: 10px 12px; }
    .d-lbl { font-size: 11px; color: var(--sub); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .d-val { font-size: 15px; font-weight: 700; }
    .d-val.big { font-size: 22px; color: var(--primary); }
    .d-ratings { background: var(--bg); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
    .d-ratings-lbl { font-size: 11px; color: var(--sub); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .rating-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--chip); border-radius: 20px; padding: 4px 12px; margin: 3px; font-size: 13px; }
    .rating-src { color: var(--sub); font-size: 11px; font-weight: 600; }
    .rating-score { font-weight: 700; color: var(--text); }
    .d-memo { background: var(--bg); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
    .d-memo-lbl { font-size: 11px; color: var(--sub); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .d-memo-txt { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .ext-links { display: flex; gap: 8px; margin-bottom: 14px; }
    .ext-btn {
      flex: 1; padding: 10px 6px; border-radius: 10px; border: 1.5px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 13px; font-weight: 700;
      text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; cursor: pointer;
    }
    .ext-btn:active { background: var(--chip); }
    .sheet-actions { display: flex; gap: 10px; padding: 8px 16px 24px; flex-shrink: 0; }
    .btn-edit { flex: 1; padding: 13px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-edit:active { opacity: .85; }
    .btn-del { padding: 13px 20px; border-radius: 12px; border: 1.5px solid #C03050; background: none; color: #C03050; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-del:active { background: #FFF0F4; }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%) translateY(16px); background: #333; color: #fff; padding: 10px 22px; border-radius: 22px; font-size: 14px; z-index: 500; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-icon">🍷</div>
    <div class="login-brand">MWC</div>
    <div class="login-name">My Wine Cellar</div>
    <button class="login-btn" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Google로 로그인
    </button>
  </div>
</div>

<!-- Loading -->
<div id="loading-overlay"><div class="spinner"></div></div>

<!-- Header -->
<div id="header">
  <span id="logo">MWC</span>
  <input type="text" id="search-input" placeholder="와인명, 생산자, 품종 검색...">
  <img id="user-avatar" title="로그아웃" onclick="confirmLogout()">
  <button class="hdr-btn" id="dark-toggle" onclick="toggleDark()">🌙</button>
</div>

<!-- Filter Bar -->
<div id="filter-bar">
  <div id="type-chips">
    <div class="type-chip active" data-type="전체" onclick="setType(this)">전체</div>
    <div class="type-chip" data-type="레드" onclick="setType(this)">레드</div>
    <div class="type-chip" data-type="화이트" onclick="setType(this)">화이트</div>
    <div class="type-chip" data-type="로제" onclick="setType(this)">로제</div>
    <div class="type-chip" data-type="스파클링" onclick="setType(this)">스파클링</div>
    <div class="type-chip" data-type="디저트" onclick="setType(this)">디저트</div>
    <div class="type-chip" data-type="주정강화" onclick="setType(this)">주정강화</div>
    <div class="type-chip" data-type="기타" onclick="setType(this)">기타</div>
  </div>
  <div id="filter-row2">
    <select class="fsel" id="f-country" onchange="applyFilters()"><option value="">국가 전체</option></select>
    <select class="fsel" id="f-grape" onchange="applyFilters()"><option value="">품종 전체</option></select>
    <select class="fsel" id="f-sort" onchange="applyFilters()">
      <option value="addedDesc">최근 등록순</option>
      <option value="vintageAsc">빈티지 ↑</option>
      <option value="vintageDesc">빈티지 ↓</option>
      <option value="nameAsc">이름순</option>
      <option value="priceDesc">가격 높은순</option>
      <option value="bottlesDesc">병수 많은순</option>
    </select>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="stats-bar">
    <span id="stats-txt"></span>
    <button id="clear-btn" onclick="clearFilters()">필터 초기화</button>
  </div>
  <div id="wine-list"></div>
  <div id="no-results"><div class="es">검색 결과가 없습니다</div></div>
  <div id="empty-state">
    <div class="ei">🍷</div>
    <div class="et">셀러가 비어 있습니다</div>
    <div class="es">+ 버튼을 눌러 와인을 추가하세요</div>
  </div>
</div>

<!-- FAB -->
<button id="fab" onclick="openForm(null)">+</button>

<!-- Backdrop -->
<div id="backdrop"></div>

<!-- Form Panel -->
<div id="form-panel">
  <div id="form-hdr">
    <button class="fhbtn" onclick="closeForm()">✕</button>
    <span id="form-title">와인 추가</span>
    <button class="fhbtn" onclick="saveWine()">저장</button>
  </div>
  <div id="form-body">

    <!-- Photo -->
    <div class="fg">
      <label class="fl">와인 사진</label>
      <div class="photo-area" id="photo-area" onclick="triggerPhoto()">
        <img id="photo-preview" alt="">
        <div class="photo-placeholder" id="photo-placeholder">
          <span>📷</span><span>사진 추가 (탭하여 선택)</span>
        </div>
        <button type="button" id="photo-del-btn" onclick="clearPhoto(event)">✕</button>
      </div>

<script>

const GRAPES = [
  {sep:"── 레드 품종 ──"},

  "세미용","베르멘티노","피아노","그레코","베르데호","토론테스",
  {sep:"── 블렌드 ──"},
  "보르도 블렌드(레드)","보르도 블렌드(화이트)","론 블렌드(레드)","GSM 블렌드","슈퍼 투스칸",
  {sep:"── 기타 ──"},
  "기타 (직접 입력)"
];

const RATING_SOURCES = ["Vivino","Wine Searcher","Wine Spectator","Wine Enthusiast","Decanter","James Suckling"];

// ── STATE ──────────────────────────────────────────────

let db, auth, storage, currentUser = null, winesUnsub = null;
let wines = [];
let curType = '전체', curCnt = '', curGrape = '', curSort = 'addedDesc', curSearch = '';
let curId = null, editMode = false, bottles = 1;
let photoFile = null, photoUrl = null, photoDeleted = false;
let isDark = localStorage.getItem('mwc-dark') === 'true';

// ── FIREBASE INIT ──────────────────────────────────────

firebase.initializeApp(firebaseConfig);
auth    = firebase.auth();
db      = firebase.firestore();
storage = firebase.storage();

auth.onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-overlay').style.display = 'none';
    const av = document.getElementById('user-avatar');
    if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
    subscribeWines();
  } else {
    document.getElementById('login-overlay').style.display = 'flex';
    if (winesUnsub) { winesUnsub(); winesUnsub = null; }
    wines = [];
  }
});

// ── AUTH ───────────────────────────────────────────────

function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(() => auth.signInWithRedirect(provider));
}

function confirmLogout() {
  if (confirm('로그아웃 하시겠습니까?')) auth.signOut();
}

// ── FIRESTORE ──────────────────────────────────────────

function userCol() {
  return db.collection('users').doc(currentUser.uid).collection('wines');
}

function subscribeWines() {
  if (winesUnsub) winesUnsub();
  showLoading(true);
  winesUnsub = userCol().orderBy('addedAt', 'desc').onSnapshot(snap => {
    wines = snap.docs.map(d => {
      const data = d.data();
      return { id: d.id, ...data, addedAt: data.addedAt?.toMillis?.() || Date.now() };
    });
    renderWines();
    showLoading(false);
  }, () => { toast('데이터 로드 실패'); showLoading(false); });
}

// ── PHOTO HELPERS ──────────────────────────────────────

function triggerPhoto() { document.getElementById('photo-input').click(); }

function onPhotoSelected(input) {
  if (!input.files[0]) return;
  photoFile = input.files[0];
  photoDeleted = false;
  const reader = new FileReader();
  reader.onload = e => showPhotoPreview(e.target.result);
  reader.readAsDataURL(photoFile);
}

function showPhotoPreview(src) {
  const img = document.getElementById('photo-preview');
  img.src = src; img.style.display = 'block';
  document.getElementById('photo-placeholder').style.display = 'none';
  document.getElementById('photo-del-btn').classList.add('show');
}

function clearPhoto(e) {
  if (e) e.stopPropagation();
  photoFile = null; photoDeleted = true; photoUrl = null;
  const img = document.getElementById('photo-preview');
  img.src = ''; img.style.display = 'none';
  document.getElementById('photo-placeholder').style.display = 'flex';
  document.getElementById('photo-del-btn').classList.remove('show');
  document.getElementById('photo-input').value = '';
}

async function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1200;
        const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(resolve, 'image/jpeg', 0.78);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── RATINGS UI ─────────────────────────────────────────

function addRatingRow(source = '', score = '') {
  const row = document.createElement('div');
  row.className = 'rating-row';
  const srcOpts = RATING_SOURCES.map(s => `<option ${s === source ? 'selected' : ''}>${s}</option>`).join('');
  row.innerHTML = `
    <select class="fs r-src"><option value="">출처 선택</option>${srcOpts}</select>
    <input type="text" class="fi r-score" value="${esc(score)}" placeholder="예: 4.2 또는 92">
    <button type="button" class="r-del" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('ratings-list').appendChild(row);
}

function getRatings() {
  return [...document.querySelectorAll('#ratings-list .rating-row')]
    .map(r => ({ source: r.querySelector('.r-src').value, score: r.querySelector('.r-score').value.trim() }))
    .filter(r => r.source || r.score);
}

// ── GRAPE CUSTOM ───────────────────────────────────────

function onGrapeChange() {
  const isCustom = document.getElementById('fi-grape').value === '기타 (직접 입력)';
  document.getElementById('fi-grape-custom-wrap').style.display = isCustom ? 'block' : 'none';
  if (isCustom) document.getElementById('fi-grape-custom').focus();
}

function getGrapeValue() {
  const sel = document.getElementById('fi-grape').value;
  if (sel === '기타 (직접 입력)') return document.getElementById('fi-grape-custom').value.trim();
  return sel;
}

function setGrapeValue(grape) {
  if (!grape) { document.getElementById('fi-grape').value = ''; return; }
  const allOpts = [...document.getElementById('fi-grape').options].map(o => o.value);
  if (allOpts.includes(grape)) {
    document.getElementById('fi-grape').value = grape;
    document.getElementById('fi-grape-custom-wrap').style.display = 'none';
  } else {
    document.getElementById('fi-grape').value = '기타 (직접 입력)';
    document.getElementById('fi-grape-custom').value = grape;
    document.getElementById('fi-grape-custom-wrap').style.display = 'block';
  }
}

// ── FORM ───────────────────────────────────────────────

function openForm(id) {
  editMode = !!id; curId = id || null;
  document.getElementById('form-title').textContent = editMode ? '와인 수정' : '와인 추가';

  // Reset all
  ['fi-name','fi-winery','fi-type','fi-country','fi-grape','fi-vintage','fi-price','fi-purchase','fi-memo'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('fi-region').innerHTML = '<option value="">선택</option>';
  document.getElementById('fi-grape-custom').value = '';
  document.getElementById('fi-grape-custom-wrap').style.display = 'none';
  document.getElementById('ratings-list').innerHTML = '';
  bottles = 1; document.getElementById('bottle-count').textContent = '1';
  clearPhoto(null);

  if (editMode) {
    const w = wines.find(x => x.id === id);
    if (!w) return;
    document.getElementById('fi-name').value     = w.name || '';
    document.getElementById('fi-winery').value   = w.winery || '';
    document.getElementById('fi-type').value     = w.type || '';
    document.getElementById('fi-country').value  = w.country || '';
    updateRegions();
    document.getElementById('fi-region').value   = w.region || '';
    setGrapeValue(w.grape || '');
    document.getElementById('fi-vintage').value  = w.vintage || '';
    document.getElementById('fi-price').value    = w.price || '';
    document.getElementById('fi-purchase').value = w.purchasePlace || '';
    document.getElementById('fi-memo').value     = w.memo || '';
    bottles = +w.bottles || 1;
    document.getElementById('bottle-count').textContent = bottles;
    (w.ratings || []).forEach(r => addRatingRow(r.source, r.score));
    if (w.photoUrl) {
      photoUrl = w.photoUrl; photoDeleted = false;
      showPhotoPreview(w.photoUrl);
    }
  }

  document.getElementById('form-body').scrollTop = 0;
  document.getElementById('form-panel').classList.add('show');
  document.getElementById('backdrop').classList.add('show');
}

function closeForm() {
  document.getElementById('form-panel').classList.remove('show');
  document.getElementById('backdrop').classList.remove('show');
}

function chgBottles(d) {
  bottles = Math.max(0, bottles + d);
  document.getElementById('bottle-count').textContent = bottles;
}

async function saveWine() {
  const name = document.getElementById('fi-name').value.trim();
  if (!name) { toast('와인명을 입력하세요'); return; }
  const type = document.getElementById('fi-type').value;
  if (!type) { toast('와인 종류를 선택하세요'); return; }

  showLoading(true);
  try {
    const wineId = editMode ? curId : Date.now().toString();
    let finalPhotoUrl = editMode ? (wines.find(w => w.id === curId)?.photoUrl || null) : null;

    // Handle photo
    if (photoDeleted && finalPhotoUrl) {
      try { await storage.refFromURL(finalPhotoUrl).delete(); } catch (_) {}
      finalPhotoUrl = null;
    }
    if (photoFile) {
      if (finalPhotoUrl) {
        try { await storage.refFromURL(finalPhotoUrl).delete(); } catch (_) {}
      }
      const blob = await compressImage(photoFile);
      const ref = storage.ref(`mwc/${currentUser.uid}/${wineId}_${Date.now()}.jpg`);
      await ref.put(blob);
      finalPhotoUrl = await ref.getDownloadURL();
    }

    const data = {
      name, type,
      winery:       document.getElementById('fi-winery').value.trim(),
      country:      document.getElementById('fi-country').value,
      region:       document.getElementById('fi-region').value,
      grape:        getGrapeValue(),
      vintage:      document.getElementById('fi-vintage').value,
      bottles,
      price:        document.getElementById('fi-price').value,
      purchasePlace:document.getElementById('fi-purchase').value.trim(),
      ratings:      getRatings(),
      memo:         document.getElementById('fi-memo').value.trim(),
      photoUrl:     finalPhotoUrl || null,
      uid:          currentUser.uid
    };

    if (editMode) {
      await userCol().doc(curId).update(data);
    } else {
      data.addedAt = firebase.firestore.FieldValue.serverTimestamp();
      await userCol().doc(wineId).set(data);
    }

    closeForm();
    toast(editMode ? '수정되었습니다' : '와인이 추가되었습니다 🍷');
  } catch (e) {
    toast('저장 실패: ' + (e.message || ''));
  }
  showLoading(false);
}

  if (w.grape)   chips += `<span class="sh-chip">${esc(w.grape)}</span>`;
  if (w.country) chips += `<span class="sh-chip">${esc(w.country)}</span>`;

  if (w.price)        grid += `<div class="d-item"><div class="d-lbl">구매가</div><div class="d-val">${fmtPrice(w.price)}</div></div>`;
  if (w.purchasePlace) grid += `<div class="d-item"><div class="d-lbl">구매처</div><div class="d-val" style="font-size:13px">${esc(w.purchasePlace)}</div></div>`;
  document.getElementById('d-grid').innerHTML = grid;

  const ratings = w.ratings || [];

  } else {
    dRatings.style.display = 'none';
  }

  // External links
  const q = encodeURIComponent((w.name || '') + (w.vintage && w.vintage !== 'NV' ? ' ' + w.vintage : ''));
  document.getElementById('ext-links').innerHTML = `
    <a class="ext-btn" href="https://www.vivino.com/search/wines?q=${q}" target="_blank" rel="noopener">🍷 Vivino</a>
    <a class="ext-btn" href="https://www.wine-searcher.com/find/${encodeURIComponent(w.name || '')}" target="_blank" rel="noopener">🔍 Wine-Searcher</a>
  `;

  const dMemo = document.getElementById('d-memo');
  if (w.memo) { dMemo.style.display = 'block'; document.getElementById('d-memo-txt').textContent = w.memo; }
  else dMemo.style.display = 'none';

  document.getElementById('sheet-body').scrollTop = 0;
  document.getElementById('detail-sheet').classList.add('show');
  document.getElementById('backdrop').classList.add('show');
}

function closeDetail() {
  document.getElementById('detail-sheet').classList.remove('show');
  document.getElementById('backdrop').classList.remove('show');
}

function editCurrent() {
  document.getElementById('detail-sheet').classList.remove('show');
  openForm(curId);
}

async function deleteCurrent() {
  if (!confirm('이 와인을 삭제할까요?')) return;
  showLoading(true);
  try {
    const w = wines.find(x => x.id === curId);
    if (w?.photoUrl) {
      try { await storage.refFromURL(w.photoUrl).delete(); } catch (_) {}
    }
    await userCol().doc(curId).delete();
    closeDetail();
    toast('삭제되었습니다');
  } catch (e) {
    toast('삭제 실패');
  }
  showLoading(false);
}

// ── FILTER / SORT ──────────────────────────────────────

function setType(el) {
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  curType = el.dataset.type;
  applyFilters();
}

function applyFilters() {
  curCnt   = document.getElementById('f-country').value;
  curGrape = document.getElementById('f-grape').value;
  curSort  = document.getElementById('f-sort').value;
  renderWines();
  updateClearBtn();
}

function clearFilters() {
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.type-chip[data-type="전체"]').classList.add('active');
  curType = '전체'; curCnt = ''; curGrape = ''; curSearch = '';
  document.getElementById('f-country').value = '';
  document.getElementById('f-grape').value   = '';
  document.getElementById('search-input').value = '';
  renderWines(); updateClearBtn();
}

function updateClearBtn() {
  document.getElementById('clear-btn').style.display =
    (curType !== '전체' || curCnt || curGrape || curSearch) ? 'inline-block' : 'none';
}

function getFiltered() {
  let list = [...wines];
  if (curType !== '전체') list = list.filter(w => w.type === curType);
  if (curCnt)   list = list.filter(w => w.country === curCnt);
  if (curGrape) list = list.filter(w => w.grape === curGrape);
  if (curSearch) {
    list = list.filter(w =>
      [w.name, w.winery, w.country, w.region, w.grape, w.memo]
        .some(v => (v || '').toLowerCase().includes(curSearch))
    );
  }
  list.sort((a, b) => {
    switch (curSort) {
      case 'vintageAsc':  { const va = !a.vintage||a.vintage==='NV'?9999:+a.vintage||9999, vb=!b.vintage||b.vintage==='NV'?9999:+b.vintage||9999; return va-vb; }
      case 'vintageDesc': { const va = !a.vintage||a.vintage==='NV'?0:+a.vintage||0, vb=!b.vintage||b.vintage==='NV'?0:+b.vintage||0; return vb-va; }
      case 'nameAsc':     return (a.name||'').localeCompare(b.name||'','ko');
      case 'priceDesc':   return (+b.price||0)-(+a.price||0);
      case 'bottlesDesc': return (+b.bottles||0)-(+a.bottles||0);
      default:            return (b.addedAt||0)-(a.addedAt||0);
    }
  });
  return list;
}

// ── RENDER ─────────────────────────────────────────────

function fmtPrice(p) { return p ? '₩' + (+p).toLocaleString('ko-KR') : ''; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderWines() {
  const list = getFiltered();
  const container = document.getElementById('wine-list');
  container.innerHTML = '';

  const totalB = wines.reduce((s, w) => s + (+w.bottles || 0), 0);
  document.getElementById('stats-txt').textContent = `총 ${wines.length}종 · ${totalB}병`;

  rebuildFilterDropdowns();

  document.getElementById('empty-state').style.display = !wines.length ? 'block' : 'none';
  document.getElementById('no-results').style.display  = wines.length && !list.length ? 'block' : 'none';
  if (!list.length) return;

  list.forEach(w => {
    const card = document.createElement('div');
    card.className = 'wine-card';
    card.onclick = () => openDetail(w.id);

    let chips = '';
    if (w.type)    chips += `<span class="mc ct-${esc(w.type)}">${esc(w.type)}</span>`;
    if (w.vintage) chips += `<span class="mc mc-dim">${esc(w.vintage)}</span>`;
    if (w.grape)   chips += `<span class="mc mc-dim">${esc(w.grape)}</span>`;
    if (w.country) chips += `<span class="mc mc-dim">${esc(w.country)}${w.region ? ' · ' + esc(w.region) : ''}</span>`;

    const ratings = w.ratings || [];
    let ratingHtml = '';
    if (ratings.length === 1) ratingHtml = `<span class="wine-ratings-preview">${esc(ratings[0].source)} ${esc(ratings[0].score)}</span>`;
    else if (ratings.length > 1) ratingHtml = `<span class="wine-ratings-preview">${esc(ratings[0].source)} ${esc(ratings[0].score)} +${ratings.length - 1}</span>`;

    card.innerHTML = `
      <div class="card-photo">
        ${w.photoUrl ? `<img src="${esc(w.photoUrl)}" alt="" loading="lazy">` : '🍷'}
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="wine-name">${esc(w.name)}</div>
          <div class="bottle-badge">${w.bottles || 1}병</div>
        </div>
        ${w.winery ? `<div class="wine-winery">${esc(w.winery)}</div>` : ''}
        <div class="card-chips">${chips}</div>
        <div class="card-bottom">
          <span class="wine-price">${fmtPrice(w.price)}</span>
          ${ratingHtml}
        </div>
        ${w.memo ? `<div class="wine-memo">${esc(w.memo)}</div>` : ''}
      </div>
    `;
    container.appendChild(card);
  });
}

function rebuildFilterDropdowns() {
  const cSel = document.getElementById('f-country');
  const gSel = document.getElementById('f-grape');
  const pc = cSel.value, pg = gSel.value;
  cSel.innerHTML = '<option value="">국가 전체</option>';
  const countries = [...new Set(wines.map(w => w.country).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'));
  countries.forEach(c => cSel.appendChild(new Option(c, c)));
  if (countries.includes(pc)) cSel.value = pc;
  gSel.innerHTML = '<option value="">품종 전체</option>';
  const grapes = [...new Set(wines.map(w => w.grape).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'));
  grapes.forEach(g => gSel.appendChild(new Option(g, g)));
  if (grapes.includes(pg)) gSel.value = pg;
}

// ── FORM DROPDOWN BUILDERS ─────────────────────────────

function buildFormDropdowns() {
  const cSel = document.getElementById('fi-country');
  Object.keys(CR).forEach(c => cSel.appendChild(new Option(c, c)));

  const gSel = document.getElementById('fi-grape');
  GRAPES.forEach(g => {
    if (g.sep) {
      const o = new Option(g.sep, ''); o.disabled = true;
      o.style.cssText = 'color:#999;font-style:italic';
      gSel.appendChild(o);
    } else {
      gSel.appendChild(new Option(g, g));
    }
  });

  const vSel = document.getElementById('fi-vintage');
  const yr = new Date().getFullYear();
  for (let y = yr; y >= 1950; y--) vSel.appendChild(new Option(y, y));
}

function updateRegions() {
  const country = document.getElementById('fi-country').value;
  const rSel = document.getElementById('fi-region');
  rSel.innerHTML = '<option value="">선택</option>';
  if (country && CR[country]) CR[country].forEach(r => rSel.appendChild(new Option(r, r)));
}

// ── THEME ──────────────────────────────────────────────

function applyTheme() {
  document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
}
function toggleDark() { isDark = !isDark; localStorage.setItem('mwc-dark', isDark); applyTheme(); }

// ── UTIL ───────────────────────────────────────────────

function showLoading(v) { document.getElementById('loading-overlay').classList.toggle('show', v); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}
function adjustLayout() {
  const h = document.getElementById('header').offsetHeight + document.getElementById('filter-bar').offsetHeight + 8;
  document.getElementById('main').style.paddingTop = h + 'px';
}

// ── INIT ───────────────────────────────────────────────

function init() {
  applyTheme();
  buildFormDropdowns();
  adjustLayout();
  window.addEventListener('resize', adjustLayout);

  document.getElementById('search-input').addEventListener('input', e => {
    curSearch = e.target.value.trim().toLowerCase();
    applyFilters();
  });

  document.getElementById('backdrop').addEventListener('click', () => {
    if (document.getElementById('form-panel').classList.contains('show')) closeForm();
    else closeDetail();
  });

  let sy = 0;
  const sh = document.getElementById('detail-sheet');
  sh.addEventListener('touchstart', e => { sy = e.touches[0].clientY; }, { passive: true });
  sh.addEventListener('touchmove', e => { if (e.touches[0].clientY - sy > 60) closeDetail(); }, { passive: true });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
}

init();
</script>
